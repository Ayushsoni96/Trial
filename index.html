<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Asteroid Dodge ∞</title>

<!-- ===== GameMonetize.com SDK ===== -->
<script type="text/javascript">
  window.sdkReady = false;
  window.adWatching = false;
  window.SDK_OPTIONS = {
    gameId: "fy5639e9wors1j8wu5nhgke5ae5lz06t",
    onEvent: function(a) {
      switch(a.name) {
        case "SDK_READY":
          window.sdkReady = true;
          console.log("[SDK] GameMonetize Ready");
          break;
        case "SDK_GAME_PAUSE":
          // Ad shuru — game pause karo
          window.adWatching = true;
          if(typeof pauseForAd === 'function') pauseForAd();
          break;
        case "SDK_GAME_START":
          // Ad khatam — game resume karo
          window.adWatching = false;
          if(typeof resumeAfterAd === 'function') resumeAfterAd();
          break;
      }
    }
  };
  (function(a,b,c){
    var d=a.getElementsByTagName(b)[0];
    a.getElementById(c)||(a=a.createElement(b),a.id=c,
    a.src="https://api.gamemonetize.com/sdk.js",d.parentNode.insertBefore(a,d))
  })(document,"script","gamemonetize-sdk");
</script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; background:#000;
  overflow:hidden; font-family:Arial,sans-serif;
  touch-action:none; user-select:none; -webkit-user-select:none;
}

/* HUD */
#hud {
  position:fixed; top:0; left:0; right:0; height:50px;
  background:#000; border-bottom:1px solid #0ff3;
  display:flex; justify-content:space-around; align-items:center; z-index:100;
}
.hstat { display:flex; flex-direction:column; align-items:center; }
.hstat label { font-size:8px; color:#0ff6; letter-spacing:2px; }
.hstat b { font-size:14px; color:#0ff; font-weight:bold; }

/* GAME AREA */
#gameArea { position:fixed; top:50px; left:0; right:0; bottom:0; }
canvas { position:absolute; top:0; left:0; width:100%; height:100%; }

/* ABILITY BAR */
#abilityBar {
  position:absolute; bottom:14px; left:50%;
  transform:translateX(-50%);
  z-index:60; display:none;
  flex-direction:column; align-items:center; gap:5px;
}
#abilityBtn {
  width:68px; height:68px; border-radius:50%;
  border:3px solid #fff3; background:rgba(0,0,30,0.88);
  font-size:26px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 16px #0004;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  position:relative; overflow:hidden;
}
#abilityBtn.ready { border-color:#0ff; box-shadow:0 0 22px #0ff8; }
#abilityBtn.active { border-color:#ffdd00; box-shadow:0 0 22px #ffdd0099; }
#abilityCooldown {
  position:absolute; bottom:0; left:0; right:0;
  background:rgba(0,255,200,0.22); transition:height 0.1s linear;
}
#abilityLabel { font-size:10px; color:#aaa; letter-spacing:1px; background:rgba(0,0,0,0.6); padding:2px 10px; border-radius:8px; }

/* SCREENS */
.screen {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:15px; background:rgba(0,0,20,0.96); z-index:50;
}
.screen h1 { font-size:clamp(24px,7vw,40px); color:#0ff; text-shadow:0 0 22px #0ff; text-align:center; line-height:1.25; }
.screen h2 { font-size:clamp(13px,4vw,19px); color:#fff; text-align:center; }
.screen p  { font-size:12px; color:#666; text-align:center; padding:0 22px; line-height:1.7; }
.bignum    { font-size:clamp(46px,13vw,70px); font-weight:bold; color:#fff; }

.btn {
  padding:13px 40px; font-size:16px; font-weight:bold;
  background:#0ff; color:#000; border:none; border-radius:10px;
  cursor:pointer; letter-spacing:2px;
  box-shadow:0 0 22px #0ff9;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  min-width:150px; min-height:50px;
}
.btn:active { opacity:.8; transform:scale(0.96); }
.btn-outline {
  padding:11px 32px; font-size:14px; font-weight:bold;
  background:transparent; color:#0ff; border:2px solid #0ff; border-radius:10px;
  cursor:pointer; letter-spacing:2px;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  min-width:130px; min-height:46px;
}
.btn-outline:active { background:#0ff2; }

/* COIN MULTIPLIER SLIDE — CURVED ARC */
#coinSlide {
  position:absolute; inset:0;
  background:rgba(0,0,15,0.97);
  z-index:70; display:none;
  flex-direction:column; align-items:center; justify-content:center;
  gap:8px; padding:16px; overflow:hidden;
}
#coinSlide h2 { font-size:clamp(18px,5vw,26px); color:#ffdd00; text-shadow:0 0 16px #ffdd0088; letter-spacing:3px; }
#coinSlide .earned { font-size:clamp(38px,12vw,58px); font-weight:bold; color:#fff; line-height:1; }
#coinSlide .sub { font-size:11px; color:#555; letter-spacing:2px; }
#arcContainer { position:relative; width:min(340px,90vw); height:210px; margin-top:6px; flex-shrink:0; }
#arcSvg { position:absolute; top:0; left:0; width:100%; height:100%; overflow:visible; }
#arcArrow {
  position:absolute; bottom:0; left:50%;
  transform-origin:bottom center;
  transform:translateX(-50%) rotate(0deg);
  transition:transform 0.45s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none; z-index:5;
}
.arc-btn-wrap {
  position:absolute; display:flex; flex-direction:column; align-items:center; gap:3px;
  transform:translate(-50%,-50%); cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.arc-mult-btn {
  width:52px; height:52px; border-radius:50%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-size:12px; font-weight:bold; letter-spacing:1px;
  border:2px solid; cursor:pointer;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  transition:transform 0.15s, box-shadow 0.15s; line-height:1.2;
}
.arc-mult-btn:active { transform:scale(0.9); }
.arc-mult-btn.free { background:rgba(0,255,136,0.15); border-color:#00ff88; color:#00ff88; box-shadow:0 0 14px #00ff8844; }
.arc-mult-btn.paid { background:rgba(255,221,0,0.1); border-color:#ffdd00; color:#ffdd00; box-shadow:0 0 12px #ffdd0033; }
.arc-mult-btn.used { background:rgba(60,60,60,0.2); border-color:#333; color:#444; box-shadow:none; pointer-events:none; }
.arc-mult-btn.selected { transform:scale(1.18); }
.arc-btn-label { font-size:9px; color:#555; letter-spacing:1px; white-space:nowrap; }
#arcResultText { font-size:20px; font-weight:bold; color:#ffdd00; min-height:28px; text-align:center; text-shadow:0 0 12px #ffdd0099; }
.skip-btn {
  font-size:12px; color:#444; background:none; border:none;
  cursor:pointer; letter-spacing:1px; padding:6px 20px;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
}
.skip-btn:active { color:#888; }

/* SHOP */
#shopScreen {
  position:absolute; inset:0;
  background:rgba(0,0,20,0.97); z-index:55;
  display:none; flex-direction:column;
  align-items:center; padding:14px 12px 14px; gap:10px; overflow:hidden;
}
#shopScreen h1 { font-size:clamp(20px,6vw,32px); color:#ffdd00; text-shadow:0 0 16px #ffdd0088; letter-spacing:3px; flex-shrink:0; }
.coins-row { display:flex; align-items:center; gap:8px; font-size:15px; color:#ffdd00; font-weight:bold; flex-shrink:0; }
.shop-tabs { display:flex; gap:8px; flex-shrink:0; }
.tab-btn {
  padding:8px 20px; font-size:13px; font-weight:bold;
  background:rgba(255,255,255,0.05); color:#aaa;
  border:1px solid #333; border-radius:8px; cursor:pointer;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
}
.tab-btn.active { background:#0ff; color:#000; border-color:#0ff; }
.tab-btn:active { opacity:.8; }
.shop-section {
  display:none; width:100%; max-width:420px;
  overflow-y:auto; flex:1;
  padding-bottom:8px;
  -webkit-overflow-scrolling:touch;
}
.shop-section.visible { display:flex; flex-direction:column; gap:10px; }

/* JET CARDS */
.jet-card {
  background:rgba(255,255,255,0.04); border:2px solid #282828;
  border-radius:14px; padding:13px 14px;
  display:flex; gap:12px; align-items:center; position:relative; overflow:hidden;
}
.jet-card.selected { border-color:#0ff; box-shadow:0 0 16px #0ff3; }
.jet-icon { font-size:40px; flex-shrink:0; line-height:1; }
.jet-info { flex:1; }
.jet-name { font-size:15px; font-weight:bold; color:#fff; margin-bottom:3px; }
.jet-ability { font-size:11px; color:#aaa; margin-bottom:5px; line-height:1.5; }
.jet-stats { display:flex; gap:8px; }
.stat-bar-wrap { display:flex; flex-direction:column; gap:2px; flex:1; }
.stat-label { font-size:9px; color:#555; letter-spacing:1px; }
.stat-bar { height:4px; border-radius:3px; background:#111; width:100%; overflow:hidden; }
.stat-fill { height:100%; border-radius:3px; }
.jet-actions { display:flex; flex-direction:column; gap:6px; align-items:flex-end; flex-shrink:0; }
.price-tag { font-size:12px; color:#ffdd00; font-weight:bold; text-align:center; }
.already-owned { font-size:11px; color:#0f0; font-weight:bold; }
.btn-buy { padding:7px 14px; font-size:11px; font-weight:bold; background:#ffdd00; color:#000; border:none; border-radius:7px; cursor:pointer; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
.btn-buy:disabled { background:#333; color:#777; cursor:not-allowed; }
.btn-select { padding:7px 14px; font-size:11px; font-weight:bold; background:transparent; color:#0ff; border:2px solid #0ff; border-radius:7px; cursor:pointer; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
.btn-select.active-jet { background:#0ff; color:#000; }
.selected-badge { position:absolute; top:7px; right:9px; font-size:9px; color:#0ff; letter-spacing:1px; font-weight:bold; }

/* ATTACHMENT CARD */
.attach-card {
  background:rgba(255,255,255,0.04); border:2px solid #282828;
  border-radius:14px; padding:14px 16px;
  display:flex; gap:14px; align-items:center; position:relative;
}
.attach-card.equipped { border-color:#ffdd00; box-shadow:0 0 16px #ffdd0044; }
.attach-icon { font-size:38px; flex-shrink:0; }
.attach-info { flex:1; }
.attach-name { font-size:15px; font-weight:bold; color:#ffdd00; margin-bottom:4px; }
.attach-desc { font-size:11px; color:#aaa; line-height:1.6; }
.attach-compat { font-size:10px; color:#0ff8; margin-top:4px; }
.attach-actions { display:flex; flex-direction:column; gap:6px; align-items:flex-end; flex-shrink:0; }
.btn-equip { padding:7px 14px; font-size:11px; font-weight:bold; background:#ffdd00; color:#000; border:none; border-radius:7px; cursor:pointer; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
.btn-equip:disabled { background:#333; color:#777; cursor:not-allowed; }
.btn-unequip { padding:7px 14px; font-size:11px; font-weight:bold; background:transparent; color:#ffdd00; border:2px solid #ffdd00; border-radius:7px; cursor:pointer; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
.equip-badge { position:absolute; top:7px; right:9px; font-size:9px; color:#ffdd00; letter-spacing:1px; font-weight:bold; }

/* TOAST */
#puToast {
  position:absolute; top:10px; left:50%; transform:translateX(-50%);
  font-size:15px; font-weight:bold; padding:7px 18px;
  border-radius:28px; z-index:65; pointer-events:none;
  opacity:0; white-space:nowrap; transition:opacity 0.3s;
}
</style>
</head>
<body>

<div id="hud">
  <div class="hstat"><label>SCORE</label><b id="elSc">0</b></div>
  <div class="hstat"><label>BEST</label><b id="elBe">0</b></div>
  <div class="hstat"><label>LEVEL</label><b id="elLv">1</b></div>
  <div class="hstat"><label>LIVES</label><b id="elLi">❤️❤️❤️</b></div>
  <div class="hstat"><label>COINS</label><b id="elCo" style="color:#ffdd00">🪙0</b></div>
</div>

<div id="gameArea">
  <canvas id="gc"></canvas>
  <div id="puToast"></div>

  <!-- AD OVERLAY — shows while ad is playing -->
  <div id="adOverlay" style="display:none;position:absolute;inset:0;background:rgba(0,0,0,0.92);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:16px;">
    <div style="font-size:36px">📺</div>
    <div style="font-size:16px;color:#fff;font-weight:bold;letter-spacing:2px">AD PLAYING...</div>
    <div style="font-size:12px;color:#aaa">Please wait</div>
  </div>

  <!-- ABILITY BAR -->
  <div id="abilityBar">
    <div id="abilityBtn">
      <div id="abilityCooldown" style="height:100%"></div>
      <span id="abilityIcon">💣</span>
    </div>
    <div id="abilityLabel">READY!</div>
  </div>

  <!-- START SCREEN -->
  <div class="screen" id="scStart">
    <h1>🚀 ASTEROID<br>DODGE ∞</h1>
    <p style="color:#aaa;font-size:13px">Earn coins • Buy jets & attachments!</p>
    <button class="btn" id="btnStart">▶ PLAY</button>
    <button class="btn-outline" id="btnShopMain">🏪 SHOP</button>
    <p>Move your ship with finger • Auto shooting ON</p>
  </div>

  <!-- GAME OVER SCREEN -->
  <div class="screen" id="scOver" style="display:none">
    <h1>💥 GAME OVER</h1>
    <h2 id="ovMsg">Final Score</h2>
    <div class="bignum" id="ovSc">0</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="btn" id="btnRetry">🔄 RETRY</button>
      <button class="btn-outline" id="btnShopOver">🏪 SHOP</button>
    </div>
  </div>

  <!-- COIN MULTIPLIER SLIDE — ARC -->
  <div id="coinSlide">
    <h2>🪙 COIN REWARD</h2>
    <div class="sub">COINS EARNED THIS GAME</div>
    <div class="earned" id="slideEarned">+0</div>
    <div class="sub">TAP A MULTIPLIER TO CLAIM!</div>

    <!-- Arc canvas area -->
    <div id="arcContainer">
      <!-- SVG arc track + arrow drawn by JS -->
      <svg id="arcSvg" viewBox="0 0 340 210" xmlns="http://www.w3.org/2000/svg">
        <!-- arc track path drawn by JS -->
      </svg>
      <!-- Arrow pointer -->
      <div id="arcArrow">
        <svg width="18" height="60" viewBox="0 0 18 60">
          <line x1="9" y1="55" x2="9" y2="8" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
          <polygon points="9,0 2,14 16,14" fill="#fff"/>
        </svg>
      </div>
      <!-- Buttons injected by JS -->
    </div>

    <div id="arcResultText">👆 Pick your multiplier</div>
    <button class="skip-btn" id="btnSkipSlide">Skip — take base coins</button>
  </div>

  <!-- SHOP SCREEN -->
  <div id="shopScreen">
    <h1>🏪 SHOP</h1>
    <div class="coins-row">🪙 <span id="shopCoins">0</span></div>
    <div class="shop-tabs">
      <button class="tab-btn active" id="tabJets">✈️ Jets</button>
      <button class="tab-btn" id="tabAttach">🔩 Attachments</button>
    </div>

    <!-- JETS -->
    <div class="shop-section visible" id="sectionJets" id="jetsGrid"></div>

    <!-- ATTACHMENTS -->
    <div class="shop-section" id="sectionAttach"></div>

    <button class="btn-outline" id="btnShopClose" style="margin-top:4px;flex-shrink:0">✕ CLOSE</button>
  </div>
</div>

<script>
// ================================================================
// DATA
// ================================================================
const JETS = [
  {
    id:'starter', name:'🚀 Star Flyer', icon:'🚀', color:'#aaaaaa',
    price:0,
    abilityName:'NO ABILITY', abilityIcon:'—',
    abilityDesc:'Basic starter jet — no special ability. Buy upgraded jets for powers!',
    stats:{speed:2,shield:1,power:1},
    spawnMult:1.0, spdMult:1.0,
    noAbility:true,
  },
  {
    id:'chrono', name:'⚡ Chrono Hawk', icon:'⚡', color:'#00d4ff',
    price:300,
    abilityName:'TIME FREEZE', abilityIcon:'⏱️',
    abilityDesc:'Every 30s: Slows all asteroids for 8 seconds!',
    stats:{speed:4,shield:2,power:3},
    spawnMult:1.0, spdMult:1.0,
    noAbility:false,
  },
  {
    id:'guardian', name:'🛡️ Iron Guardian', icon:'🛡️', color:'#a855f7',
    price:800,
    abilityName:'FORCE SHIELD', abilityIcon:'🛡️',
    abilityDesc:'Every 30s: Activates an indestructible shield for 10 seconds!',
    stats:{speed:2,shield:5,power:2},
    spawnMult:1.1, spdMult:1.05,
    noAbility:false,
  },
  {
    id:'blaster', name:'🔥 Blaze Striker', icon:'🔥', color:'#ff6b35',
    price:2500,
    abilityName:'MEGA BLAST', abilityIcon:'💣',
    abilityDesc:'Every 30s: Destroys ALL asteroids on screen instantly!',
    stats:{speed:3,shield:1,power:5},
    spawnMult:1.2, spdMult:1.1,
    noAbility:false,
  },
];

const ATTACHMENTS = [
  {
    id:'dual_cannon',
    name:'🔫 Dual Cannon',
    icon:'🔫',
    price:400,
    desc:'Fires 2 bullets simultaneously — left & right! Double the killing speed!',
    compat:'Compatible with all jets',
    effect:'dual_bullet',
  },
];

const MULT_OPTIONS = [
  { label:'1x',  val:1.0, free:true  },
  { label:'2x',  val:2.0, free:false },
];

// ================================================================
// PERSISTENCE
// ================================================================
function save() {
  try {
    localStorage.setItem('adg3_coins',   coins);
    localStorage.setItem('adg3_owned',   JSON.stringify(owned));
    localStorage.setItem('adg3_jet',     selectedJet);
    localStorage.setItem('adg3_best',    best);
    localStorage.setItem('adg3_attach',  JSON.stringify(ownedAttach));
    localStorage.setItem('adg3_equip',   equippedAttach);
  } catch(e){}
}
function load() {
  try {
    coins         = parseInt(localStorage.getItem('adg3_coins'))||0;
    owned         = JSON.parse(localStorage.getItem('adg3_owned'))||['starter'];
    selectedJet   = localStorage.getItem('adg3_jet')||'starter';
    best          = parseInt(localStorage.getItem('adg3_best'))||0;
    ownedAttach   = JSON.parse(localStorage.getItem('adg3_attach'))||[];
    equippedAttach= localStorage.getItem('adg3_equip')||'';
  } catch(e) {
    coins=0; owned=['starter']; selectedJet='starter'; best=0; ownedAttach=[]; equippedAttach='';
  }
}

let coins, owned, selectedJet, best, ownedAttach, equippedAttach;
load();

// ================================================================
// AD SYSTEM — GameMonetize SDK
// ================================================================
let pendingAdCallback = null;  // function to call after ad completes
let adPausedTick = false;

function showAd(callback) {
  pendingAdCallback = callback;
  if(typeof sdk !== 'undefined' && sdk.showBanner) {
    sdk.showBanner();
  } else {
    // SDK not loaded / local testing — simulate ad after 1.5s
    console.log("[SDK] showBanner called (fallback)");
    setTimeout(()=>{ resumeAfterAd(); }, 1500);
  }
}

function pauseForAd() {
  // pause game loop if running
  adPausedTick = running;
  if(running){ running = false; }
  // dim screen
  document.getElementById('adOverlay').style.display='flex';
}

function resumeAfterAd() {
  document.getElementById('adOverlay').style.display='none';
  // resume game if it was running
  if(adPausedTick){ running=true; loop(); adPausedTick=false; }
  // fire pending callback
  if(pendingAdCallback){ pendingAdCallback(); pendingAdCallback=null; }
}

// ================================================================
// CANVAS
// ================================================================
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
const area   = document.getElementById('gameArea');
let W, H;
function resize() {
  const r=area.getBoundingClientRect(); W=r.width; H=r.height;
  canvas.width=W; canvas.height=H;
}
resize();
window.addEventListener('resize', resize);

// ================================================================
// BUTTON WIRING
// ================================================================
function wireBtn(id, fn) {
  const el=document.getElementById(id);
  if(!el) return;
  el.addEventListener('click', function(e){ e.stopPropagation(); fn(); });
  el.addEventListener('touchend', function(e){ e.preventDefault(); e.stopPropagation(); fn(); },{passive:false});
}
wireBtn('btnStart',     ()=>startGame());
wireBtn('btnRetry',     ()=>startGame());
wireBtn('btnShopMain',  ()=>openShop('start'));
wireBtn('btnShopOver',  ()=>openShop('over'));
wireBtn('btnShopClose', ()=>closeShop());
wireBtn('abilityBtn',   ()=>useAbility());
wireBtn('btnSkipSlide', ()=>skipSlide());
wireBtn('tabJets',      ()=>switchTab('jets'));
wireBtn('tabAttach',    ()=>switchTab('attach'));

// ================================================================
// SHOP TABS
// ================================================================
let currentTab='jets';
function switchTab(tab) {
  currentTab=tab;
  document.getElementById('tabJets').className  ='tab-btn'+(tab==='jets'?' active':'');
  document.getElementById('tabAttach').className='tab-btn'+(tab==='attach'?' active':'');
  document.getElementById('sectionJets').className  ='shop-section'+(tab==='jets'?' visible':'');
  document.getElementById('sectionAttach').className='shop-section'+(tab==='attach'?' visible':'');
}

// ================================================================
// SHOP
// ================================================================
let shopFrom='start';
function openShop(from) {
  shopFrom=from||'start';
  document.getElementById('scStart').style.display='none';
  document.getElementById('scOver').style.display='none';
  document.getElementById('shopScreen').style.display='flex';
  switchTab('jets');
  renderShop();
}
function closeShop() {
  document.getElementById('shopScreen').style.display='none';
  if(shopFrom==='over') document.getElementById('scOver').style.display='flex';
  else                  document.getElementById('scStart').style.display='flex';
}
function renderShop() {
  document.getElementById('shopCoins').textContent='🪙 '+coins;
  document.getElementById('elCo').textContent='🪙'+coins;
  renderJets();
  renderAttachments();
}

function renderJets() {
  const grid=document.getElementById('sectionJets');
  grid.innerHTML='';
  JETS.forEach(j=>{
    const isOwned=owned.includes(j.id), isSel=selectedJet===j.id, canAfford=coins>=j.price;
    const card=document.createElement('div');
    card.className='jet-card'+(isSel?' selected':'');
    const sb=(lbl,v,c)=>`<div class="stat-bar-wrap"><div class="stat-label">${lbl}</div><div class="stat-bar"><div class="stat-fill" style="width:${v*20}%;background:${c}"></div></div></div>`;
    card.innerHTML=`
      ${isSel?'<div class="selected-badge">✔ ACTIVE</div>':''}
      <div class="jet-icon">${j.icon}</div>
      <div class="jet-info">
        <div class="jet-name" style="color:${j.color}">${j.name}</div>
        <div class="jet-ability">${j.abilityIcon} <b>${j.abilityName}</b><br>${j.abilityDesc}</div>
        <div class="jet-stats">${sb('SPD',j.stats.speed,'#0ff')}${sb('SHLD',j.stats.shield,'#a855f7')}${sb('PWR',j.stats.power,'#ff6b35')}</div>
      </div>
      <div class="jet-actions">
        ${isOwned
          ?`<div class="already-owned">✔ OWNED</div><button class="btn-select${isSel?' active-jet':''}" data-id="${j.id}">${isSel?'IN USE':'SELECT'}</button>`
          :`<div class="price-tag">🪙 ${j.price}</div><button class="btn-buy" data-id="${j.id}" ${canAfford?'':'disabled'}>${canAfford?'BUY':'NO COINS'}</button>`
        }
      </div>`;
    grid.appendChild(card);
  });
  grid.querySelectorAll('.btn-buy').forEach(b=>{ wireShopBtn(b, ()=>buyJet(b.dataset.id)); });
  grid.querySelectorAll('.btn-select').forEach(b=>{ wireShopBtn(b, ()=>selectJet(b.dataset.id)); });
}

function renderAttachments() {
  const sec=document.getElementById('sectionAttach');
  sec.innerHTML='';
  ATTACHMENTS.forEach(a=>{
    const isOwned=ownedAttach.includes(a.id);
    const isEquipped=equippedAttach===a.id;
    const canAfford=coins>=a.price;
    const card=document.createElement('div');
    card.className='attach-card'+(isEquipped?' equipped':'');
    card.innerHTML=`
      ${isEquipped?'<div class="equip-badge">⚡ EQUIPPED</div>':''}
      <div class="attach-icon">${a.icon}</div>
      <div class="attach-info">
        <div class="attach-name">${a.name}</div>
        <div class="attach-desc">${a.desc}</div>
        <div class="attach-compat">✦ ${a.compat}</div>
      </div>
      <div class="attach-actions">
        ${isOwned
          ? isEquipped
            ? `<div class="already-owned">✔ OWNED</div><button class="btn-unequip" data-id="${a.id}">UNEQUIP</button>`
            : `<div class="already-owned">✔ OWNED</div><button class="btn-equip" data-id="${a.id}">EQUIP</button>`
          : `<div class="price-tag">🪙 ${a.price}</div><button class="btn-buy" data-id="${a.id}" ${canAfford?'':'disabled'}>${canAfford?'BUY':'NO COINS'}</button>`
        }
      </div>`;
    sec.appendChild(card);
  });
  sec.querySelectorAll('.btn-buy').forEach(b=>{ wireShopBtn(b, ()=>buyAttach(b.dataset.id)); });
  sec.querySelectorAll('.btn-equip').forEach(b=>{ wireShopBtn(b, ()=>equipAttach(b.dataset.id)); });
  sec.querySelectorAll('.btn-unequip').forEach(b=>{ wireShopBtn(b, ()=>unequipAttach(b.dataset.id)); });
}

function wireShopBtn(el, fn) {
  el.addEventListener('click', fn);
  el.addEventListener('touchend', e=>{ e.preventDefault(); fn(); },{passive:false});
}

function buyJet(id) {
  const j=JETS.find(x=>x.id===id);
  if(!j||owned.includes(id)||coins<j.price) return;
  coins-=j.price; owned.push(id); save(); renderShop();
  showToast('✅ JET UNLOCKED!','#00ff88');
}
function selectJet(id) {
  if(!owned.includes(id)) return;
  selectedJet=id; save(); renderShop();
}
function buyAttach(id) {
  const a=ATTACHMENTS.find(x=>x.id===id);
  if(!a||ownedAttach.includes(id)||coins<a.price) return;
  coins-=a.price; ownedAttach.push(id); equippedAttach=id; save(); renderShop();
  showToast('🔫 DUAL CANNON UNLOCKED!','#ffdd00');
}
function equipAttach(id) {
  equippedAttach=id; save(); renderShop();
  showToast('⚡ EQUIPPED!','#ffdd00');
}
function unequipAttach(id) {
  if(equippedAttach===id) equippedAttach='';
  save(); renderShop();
}

// ================================================================
// COIN MULTIPLIER SLIDE — CURVED ARC
// ================================================================
let sessionCoins=0;
let slideUsed=false;
let arcHovered=-1; // index of currently pointed option

// Arc geometry (in SVG viewBox 340x210)
const ARC_CX=170, ARC_CY=210, ARC_R=165;
const ARC_START=Math.PI, ARC_END=0; // left→right (bottom semicircle flipped to top)

function arcAngle(idx, total) {
  // spread buttons evenly across 180° arc, left to right
  const t = idx/(total-1);
  return Math.PI - t*Math.PI; // PI to 0 (left to right)
}
function arcPos(angle, r) {
  return {
    x: ARC_CX + r*Math.cos(angle),
    y: ARC_CY + r*Math.sin(angle)
  };
}
// Arrow rotation: 0deg = straight up, maps to angle=PI/2
// angle PI = left = -90deg, angle 0 = right = +90deg
function angleToArrowDeg(a) {
  return -(a - Math.PI/2) * (180/Math.PI);
}

function showCoinSlide() {
  slideUsed=false; arcHovered=-1;
  document.getElementById('scOver').style.display='none';
  document.getElementById('slideEarned').textContent='+'+sessionCoins;
  document.getElementById('arcResultText').textContent='👆 Pick your multiplier';

  const container=document.getElementById('arcContainer');
  const svg=document.getElementById('arcSvg');

  // Remove old buttons
  container.querySelectorAll('.arc-btn-wrap').forEach(e=>e.remove());

  // Draw SVG arc track
  svg.innerHTML='';
  // Track path
  const pathD=`M ${arcPos(Math.PI,ARC_R).x} ${arcPos(Math.PI,ARC_R).y} A ${ARC_R} ${ARC_R} 0 0 1 ${arcPos(0,ARC_R).x} ${arcPos(0,ARC_R).y}`;
  const track=document.createElementNS('http://www.w3.org/2000/svg','path');
  track.setAttribute('d',pathD);
  track.setAttribute('stroke','rgba(255,221,0,0.18)');
  track.setAttribute('stroke-width','2');
  track.setAttribute('fill','none');
  track.setAttribute('stroke-dasharray','6 6');
  svg.appendChild(track);

  // Tick marks at each option position
  MULT_OPTIONS.forEach((_,i)=>{
    const a=arcAngle(i,MULT_OPTIONS.length);
    const p0=arcPos(a,ARC_R-10);
    const p1=arcPos(a,ARC_R+10);
    const tick=document.createElementNS('http://www.w3.org/2000/svg','line');
    tick.setAttribute('x1',p0.x); tick.setAttribute('y1',p0.y);
    tick.setAttribute('x2',p1.x); tick.setAttribute('y2',p1.y);
    tick.setAttribute('stroke','rgba(255,221,0,0.3)');
    tick.setAttribute('stroke-width','1.5');
    svg.appendChild(tick);
  });

  // Center pivot dot
  const pivot=document.createElementNS('http://www.w3.org/2000/svg','circle');
  pivot.setAttribute('cx',ARC_CX); pivot.setAttribute('cy',ARC_CY);
  pivot.setAttribute('r','5');
  pivot.setAttribute('fill','#ffdd00');
  pivot.setAttribute('opacity','0.7');
  svg.appendChild(pivot);

  // Place buttons
  const svgRect=()=>container.getBoundingClientRect();
  MULT_OPTIONS.forEach((opt,i)=>{
    const a=arcAngle(i,MULT_OPTIONS.length);
    // percent position
    const px=(arcPos(a,ARC_R).x/340)*100+'%';
    const py=(arcPos(a,ARC_R).y/210)*100+'%';
    const result=Math.floor(sessionCoins*opt.val);

    const wrap=document.createElement('div');
    wrap.className='arc-btn-wrap';
    wrap.style.left=px; wrap.style.top=py;

    const btn=document.createElement('div');
    btn.className='arc-mult-btn '+(opt.free?'free':'paid');
    btn.innerHTML=`<span>${opt.label}</span><span style="font-size:9px;opacity:.8">${opt.free?'FREE':'📺 AD'}</span>`;

    const lbl=document.createElement('div');
    lbl.className='arc-btn-label';
    lbl.textContent='🪙'+result;

    wrap.appendChild(btn); wrap.appendChild(lbl);
    container.appendChild(wrap);

    // Hover/point arrow on enter
    const onHover=()=>{
      if(slideUsed) return;
      arcHovered=i;
      const deg=angleToArrowDeg(a);
      document.getElementById('arcArrow').style.transform=`translateX(-50%) rotate(${deg}deg)`;
      document.getElementById('arcResultText').textContent=
        `× ${opt.label}  →  🪙 ${result}`;
      // highlight
      container.querySelectorAll('.arc-mult-btn').forEach((b,bi)=>{
        b.classList.toggle('selected',bi===i);
      });
    };
    wrap.addEventListener('mouseenter',onHover);
    wrap.addEventListener('touchstart',e=>{e.stopPropagation();onHover();},{passive:true});

    // Click = claim
    const onClaim=()=>{ if(!slideUsed) claimMult(opt.val,result,opt.free); };
    btn.addEventListener('click',e=>{e.stopPropagation();onClaim();});
    btn.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();onClaim();},{passive:false});
  });

  // Point arrow to first option initially
  const a0=arcAngle(0,MULT_OPTIONS.length);
  document.getElementById('arcArrow').style.transform=
    `translateX(-50%) rotate(${angleToArrowDeg(a0)}deg)`;

  document.getElementById('coinSlide').style.display='flex';
}

function claimMult(val, result, isFree) {
  if(slideUsed) return;
  slideUsed=true;
  document.querySelectorAll('.arc-mult-btn').forEach(b=>b.classList.add('used'));
  document.getElementById('arcResultText').textContent=`✅ Claiming 🪙 ${result}...`;

  if(isFree) {
    coins+=result; save(); updateHUD();
    showToast(`🪙 +${result} coins!`,'#00ff88');
    setTimeout(()=>{
      document.getElementById('coinSlide').style.display='none';
      document.getElementById('scOver').style.display='flex';
    }, 900);
  } else {
    showAd(()=>{
      coins+=result; save(); updateHUD();
      showToast(`🪙 +${result} coins!`,'#ffdd00');
      setTimeout(()=>{
        document.getElementById('coinSlide').style.display='none';
        document.getElementById('scOver').style.display='flex';
      }, 900);
    });
  }
}

function skipSlide() {
  coins+=sessionCoins; save(); updateHUD();
  document.getElementById('coinSlide').style.display='none';
  document.getElementById('scOver').style.display='flex';
}

// ================================================================
// GAME STATE
// ================================================================
let running=false, raf=null;
let score, level, lives, tick;
let ship, asts, pups, parts, bulls, rings, floatTexts;
let tx, ty;
let shieldOn, shT, slowOn, slT, combo, comboT;
let spRate, spd, lastShot;
let screenFlash={r:0,g:0,b:0,a:0};
let abilityCooldown=0;
const ABILITY_CD = 30*60;
const SLOW_DUR   = 8*60;
const SHIELD_DUR = 10*60;
let dualBullet = false;

let gameCount = 0;
function startGame() {
  gameCount++;
  if(gameCount === 1) {
    // First play — no ad, start directly
    _doStartGame();
  } else {
    // Every retry — show ad then start
    if(typeof sdk !== 'undefined' && sdk.showBanner) {
      showAd(()=>_doStartGame());
    } else {
      _doStartGame();
    }
  }
}

function _doStartGame() {
  document.getElementById('scStart').style.display='none';
  document.getElementById('scOver').style.display='none';
  document.getElementById('shopScreen').style.display='none';
  document.getElementById('coinSlide').style.display='none';
  resize();
  const jet=JETS.find(j=>j.id===selectedJet)||JETS[0];
  dualBullet = equippedAttach==='dual_cannon';
  score=0; level=1; lives=3; tick=0; sessionCoins=0; slideUsed=false;
  asts=[]; pups=[]; parts=[]; bulls=[]; rings=[]; floatTexts=[];
  shieldOn=false; shT=0; slowOn=false; slT=0;
  combo=0; comboT=0; lastShot=0;
  screenFlash={r:0,g:0,b:0,a:0};
  spRate=Math.round(92/jet.spawnMult);
  spd=1.2*jet.spdMult;
  abilityCooldown=0;
  ship={x:W/2,y:H*0.78,trail:[],color:jet.color};
  tx=W/2; ty=H*0.78;
  const bar=document.getElementById('abilityBar');
  if(jet.noAbility) {
    // Starter jet — no ability button
    bar.style.display='none';
  } else {
    bar.style.display='flex';
    document.getElementById('abilityIcon').textContent=jet.abilityIcon;
    document.getElementById('abilityBtn').className='ready';
    document.getElementById('abilityLabel').textContent='READY!';
    document.getElementById('abilityCooldown').style.height='0%';
  }
  running=true; updateHUD();
  if(raf) cancelAnimationFrame(raf);
  loop();
} // end _doStartGame

// ================================================================
// ABILITY
// ================================================================
function useAbility() {
  if(!running||abilityCooldown>0) return;
  const jet=JETS.find(j=>j.id===selectedJet)||JETS[0];
  if(jet.noAbility) return;
  abilityCooldown=ABILITY_CD;
  document.getElementById('abilityBtn').className='active';
  if(jet.id==='chrono'){
    slowOn=true; slT=SLOW_DUR;
    screenFlash={r:0,g:200,b:255,a:0.18};
    playSound('ability');
    spawnStarburst(ship.x,ship.y,'#00d4ff');
    showFloatText(ship.x,ship.y-50,'⏱️ TIME FREEZE!','#00d4ff',17);
    showToast('⏱️ TIME FREEZE!','#00d4ff');
  } else if(jet.id==='blaster'){
    const cnt=asts.length; asts.forEach(a=>boom(a.x,a.y,a.col)); asts=[];
    const bonus=cnt*20; score+=bonus; updateHUD();
    screenFlash={r:255,g:120,b:0,a:0.5};
    playSound('bomb');
    spawnBombWave();
    showFloatText(W/2,H/2-50,`💣 +${bonus}`,'#ff6b35',20);
    showToast('💣 MEGA BLAST!','#ff6b35');
  } else if(jet.id==='guardian'){
    shieldOn=true; shT=SHIELD_DUR;
    screenFlash={r:168,g:85,b:247,a:0.2};
    playSound('shield');
    spawnStarburst(ship.x,ship.y,'#a855f7');
    showFloatText(ship.x,ship.y-50,'🛡️ SHIELD ON!','#a855f7',17);
    showToast('🛡️ SHIELD ON!','#a855f7');
  }
}

// ================================================================
// LOOP
// ================================================================
function loop() {
  if(!running) return;
  update(); draw();
  raf=requestAnimationFrame(loop);
}

function update() {
  tick++;
  const sm=slowOn?0.28:1;

  ship.x+=(tx-ship.x)*0.15;
  ship.y+=(ty-ship.y)*0.15;
  ship.x=Math.max(22,Math.min(W-22,ship.x));
  ship.y=Math.max(32,Math.min(H-32,ship.y));
  ship.trail.unshift({x:ship.x,y:ship.y});
  if(ship.trail.length>14) ship.trail.pop();

  // shooting — dual or single
  if(tick-lastShot>22){
    if(dualBullet){
      bulls.push({x:ship.x-12,y:ship.y-22,vy:-12});
      bulls.push({x:ship.x+12,y:ship.y-22,vy:-12});
    } else {
      bulls.push({x:ship.x,y:ship.y-28,vy:-12});
    }
    playSound('shoot');
    lastShot=tick;
  }
  bulls=bulls.filter(b=>b.y>-10);
  bulls.forEach(b=>b.y+=b.vy*sm);

  if(shieldOn){shT--;if(shT<=0)shieldOn=false;}
  if(slowOn){slT--;if(slT<=0)slowOn=false;}
  if(comboT>0){comboT--;if(comboT<=0)combo=0;}

  // ability cooldown
  if(abilityCooldown>0){
    abilityCooldown--;
    const pct=abilityCooldown/ABILITY_CD;
    document.getElementById('abilityCooldown').style.height=(pct*100)+'%';
    const secs=Math.ceil(abilityCooldown/60);
    document.getElementById('abilityLabel').textContent=abilityCooldown>0?secs+'s':'READY!';
    if(abilityCooldown===0){
      document.getElementById('abilityBtn').className='ready';
    showToast('⚡ ABILITY READY!','#0ff');
    }
  }

  // level up
  const jet=JETS.find(j=>j.id===selectedJet)||JETS[0];
  if(score>level*450){
    level++;
    spRate=Math.max(38,Math.round((92-level*4)/jet.spawnMult));
    spd=(1.2+level*0.2)*jet.spdMult;
    showFloatText(W/2,H/2,`⚡ LEVEL ${level}!`,'#ffdd00',24);
    playSound('levelup');
    updateHUD();
  }

  if(tick%spRate===0) spawnAst();
  if(tick%700===0)    spawnPup();   // ← powerups bahut kam

  rings=rings.filter(r=>r.a>0);
  rings.forEach(r=>{r.rad+=r.spd;r.a-=0.025;});
  floatTexts=floatTexts.filter(f=>f.life>0);
  floatTexts.forEach(f=>{f.y-=1.1;f.life--;f.a=f.life/f.maxLife;});
  if(screenFlash.a>0) screenFlash.a-=0.04;

  asts=asts.filter(a=>a.y<H+70);
  asts.forEach(a=>{
    a.y+=a.vy*sm; a.x+=a.vx*sm; a.rot+=a.rs*sm;
    if(a.x<a.r||a.x>W-a.r) a.vx*=-1;
  });

  // bullet hits
  outer: for(let bi=bulls.length-1;bi>=0;bi--){
    for(let ai=asts.length-1;ai>=0;ai--){
      const b=bulls[bi],a=asts[ai];
      if(!b||!a) continue;
      if(d2(b.x,b.y,a.x,a.y)<(a.r+4)*(a.r+4)){
        boom(a.x,a.y,a.col); asts.splice(ai,1); bulls.splice(bi,1);
        combo++; comboT=100;
        const mul=combo>=5?Math.floor(combo/3)+1:1;
        score+=10*mul;
        playSound('explode');
        // coin drop — 20% chance per asteroid destroyed
        if(Math.random()<0.20){ coins++; sessionCoins++; playSound('coin'); save(); updateHUD(); }
        if(combo>=3) showFloatText(a.x,a.y,`x${combo}!`,'#ff6b35',13);
        updateHUD(); continue outer;
      }
    }
  }

  // ship-asteroid
  for(let ai=asts.length-1;ai>=0;ai--){
    const a=asts[ai];
    if(d2(ship.x,ship.y,a.x,a.y)<(a.r+14)*(a.r+14)){
      if(shieldOn){boom(a.x,a.y,'#a855f7');spawnRing(a.x,a.y,'#a855f7',3);asts.splice(ai,1);}
      else{boom(a.x,a.y,a.col);asts.splice(ai,1);lives--;combo=0;screenFlash={r:255,g:30,b:30,a:0.45};playSound('hit');shake();updateHUD();if(lives<=0)gameOver();}
    }
  }

  // powerups
  pups=pups.filter(p=>p.y<H+50);
  pups.forEach((p,pi)=>{
    p.y+=1.8*sm; p.rot+=0.05; p.pulse=(p.pulse||0)+0.1;
    if(d2(ship.x,ship.y,p.x,p.y)<(p.r+20)*(p.r+20)){applyPowerup(p);pups.splice(pi,1);}
  });

  parts=parts.filter(p=>p.l>0);
  parts.forEach(p=>{p.x+=p.vx*sm;p.y+=p.vy*sm;p.vx*=0.94;p.vy*=0.94;p.l--;});

  // time-based coins — every 60 seconds
  if(tick%3600===0){ const tc=level*3; coins+=tc; sessionCoins+=tc; save(); updateHUD(); }
}

// ================================================================
// DRAW
// ================================================================
function draw() {
  ctx.fillStyle='#000014'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(0,200,255,0.04)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  if(slowOn){
    ctx.fillStyle='rgba(0,200,255,0.04)'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(0,200,255,0.18)'; ctx.lineWidth=3; ctx.strokeRect(2,2,W-4,H-4);
    if(tick%30===0) spawnRing(W/2,H/2,'rgba(0,200,255,0.1)',2);
  }

  parts.forEach(p=>{ctx.globalAlpha=p.l/p.ml;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r*(p.l/p.ml),0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
  rings.forEach(r=>{ctx.globalAlpha=r.a;ctx.beginPath();ctx.arc(r.x,r.y,r.rad,0,Math.PI*2);ctx.strokeStyle=r.col;ctx.lineWidth=r.lw||2;ctx.stroke();});ctx.globalAlpha=1;

  // bullets — dual shows 2 streams
  bulls.forEach(b=>{
    ctx.fillStyle='#0fc';ctx.shadowColor='#0fc';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(0,255,200,0.35)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x,b.y+14);ctx.stroke();
  });

  asts.forEach(a=>{
    ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rot);ctx.beginPath();
    for(let i=0;i<a.pts;i++){const ang=(i/a.pts)*Math.PI*2,rr=a.r*a.sh[i];i===0?ctx.moveTo(Math.cos(ang)*rr,Math.sin(ang)*rr):ctx.lineTo(Math.cos(ang)*rr,Math.sin(ang)*rr);}
    ctx.closePath();ctx.fillStyle=a.col+'28';ctx.fill();
    ctx.strokeStyle=a.col;ctx.lineWidth=2;ctx.shadowColor=a.col;ctx.shadowBlur=10;ctx.stroke();ctx.shadowBlur=0;ctx.restore();
  });

  pups.forEach(p=>{
    ctx.save();ctx.translate(p.x,p.y);
    const pulse=Math.sin(p.pulse||0)*0.18;
    if(p.type==='heart')   drawHeart(ctx,0,0,p.r*(1+pulse),p.col);
    else if(p.type==='bomb')   drawBomb(ctx,0,0,p.r*(1+pulse),p.rot);
    else if(p.type==='shield') drawShieldIcon(ctx,0,0,p.r*(1+pulse),p.rot,p.col);
    else if(p.type==='slow')   drawClockIcon(ctx,0,0,p.r*(1+pulse),p.col);
    ctx.restore();
  });

  // ship trail
  const jc=ship.color||'#00ffc8';
  ship.trail.forEach((t,i)=>{
    const al=(1-i/ship.trail.length)*0.3;
    ctx.fillStyle=`rgba(${hexRgb(jc)},${al})`;
    ctx.beginPath();ctx.arc(t.x,t.y,(1-i/ship.trail.length)*6,0,Math.PI*2);ctx.fill();
  });

  // dual cannon indicator
  if(dualBullet){
    ctx.fillStyle='rgba(255,221,0,0.5)';ctx.font='bold 10px Arial';
    ctx.textAlign='left';ctx.fillText('⚡ DUAL',6,18);
  }

  // ship
  const S=Math.min(W,H)*0.046;
  ctx.save();ctx.translate(ship.x,ship.y);
  if(shieldOn){
    const sc=selectedJet==='guardian'?'#a855f7':'#0df';
    ctx.beginPath();ctx.arc(0,0,S*2.4+Math.sin(tick*0.12)*3,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${hexRgb(sc)},${0.5+0.3*Math.sin(tick*0.2)})`;
    ctx.lineWidth=3;ctx.shadowColor=sc;ctx.shadowBlur=22;ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,S*3.0,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${hexRgb(sc)},0.15)`;ctx.lineWidth=1.5;ctx.stroke();ctx.shadowBlur=0;
  }
  ctx.shadowColor=jc;ctx.shadowBlur=22;ctx.fillStyle=jc;
  ctx.beginPath();
  ctx.moveTo(0,-S*1.9);ctx.lineTo(-S*1.1,-S*0.3);
  ctx.lineTo(-S*0.55,S*1.0);ctx.lineTo(0,S*0.5);
  ctx.lineTo(S*0.55,S*1.0);ctx.lineTo(S*1.1,-S*0.3);
  ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;ctx.fillStyle='#001830';
  ctx.beginPath();ctx.ellipse(0,-S*0.3,S*0.36,S*0.62,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=`rgba(255,${80+Math.random()*120},0,0.9)`;
  ctx.shadowColor='orange';ctx.shadowBlur=12;
  const fl=S*0.4+Math.random()*S*0.55;
  ctx.beginPath();ctx.ellipse(0,S+fl*0.4,S*0.34,fl,0,0,Math.PI*2);ctx.fill();

  // dual cannon barrels
  if(dualBullet){
    ctx.shadowBlur=0;ctx.fillStyle='#ffdd00';
    ctx.beginPath();ctx.roundRect(-S*1.05,-S*1.6,S*0.32,S*0.7,3);ctx.fill();
    ctx.beginPath();ctx.roundRect(S*0.73,-S*1.6,S*0.32,S*0.7,3);ctx.fill();
  }
  ctx.shadowBlur=0;ctx.restore();

  floatTexts.forEach(f=>{ctx.globalAlpha=f.a;ctx.fillStyle=f.col;ctx.shadowColor=f.col;ctx.shadowBlur=10;ctx.font=`bold ${f.size}px Arial`;ctx.textAlign='center';ctx.fillText(f.txt,f.x,f.y);ctx.shadowBlur=0;});
  ctx.globalAlpha=1;ctx.textAlign='left';

  if(combo>=3){ctx.fillStyle='#ff6b35';ctx.font='bold 12px Arial';ctx.textAlign='right';ctx.fillText(`COMBO x${combo}!`,W-8,20);ctx.textAlign='left';}
  if(screenFlash.a>0.01){ctx.fillStyle=`rgba(${screenFlash.r},${screenFlash.g},${screenFlash.b},${screenFlash.a})`;ctx.fillRect(0,0,W,H);}
}

function drawHeart(c,x,y,r,col){c.save();c.shadowColor=col;c.shadowBlur=18;c.fillStyle=col;c.beginPath();c.moveTo(x,y+r*0.3);c.bezierCurveTo(x,y-r*0.6,x-r*1.2,y-r*0.6,x-r*1.0,y+r*0.1);c.bezierCurveTo(x-r*1.3,y+r*0.7,x,y+r*1.3,x,y+r*1.3);c.bezierCurveTo(x,y+r*1.3,x+r*1.3,y+r*0.7,x+r*1.0,y+r*0.1);c.bezierCurveTo(x+r*1.2,y-r*0.6,x,y-r*0.6,x,y+r*0.3);c.closePath();c.fill();c.shadowBlur=0;c.restore();}
function drawBomb(c,x,y,r,rot){c.save();c.rotate(rot);c.shadowColor='#ff6b35';c.shadowBlur=18;c.fillStyle='#2a2a2a';c.beginPath();c.arc(x,y+r*0.2,r,0,Math.PI*2);c.fill();c.strokeStyle='#ff6b35';c.lineWidth=2;c.stroke();c.strokeStyle='#aaa';c.lineWidth=2;c.shadowBlur=0;c.beginPath();c.moveTo(x,y-r*0.8);c.quadraticCurveTo(x+r*0.8,y-r*1.4,x+r*0.4,y-r*1.8);c.stroke();c.fillStyle='#ffdd00';c.shadowColor='#ffdd00';c.shadowBlur=10;c.beginPath();c.arc(x+r*0.4,y-r*1.8,3+Math.random()*2,0,Math.PI*2);c.fill();c.shadowBlur=0;c.restore();}
function drawShieldIcon(c,x,y,r,rot,col){c.save();c.rotate(rot*0.3);c.shadowColor=col;c.shadowBlur=16;c.strokeStyle=col;c.lineWidth=2.5;c.fillStyle=col+'30';c.beginPath();c.moveTo(x,y-r);c.lineTo(x+r*0.9,y-r*0.3);c.lineTo(x+r*0.9,y+r*0.3);c.quadraticCurveTo(x+r*0.9,y+r*1.0,x,y+r*1.2);c.quadraticCurveTo(x-r*0.9,y+r*1.0,x-r*0.9,y+r*0.3);c.lineTo(x-r*0.9,y-r*0.3);c.closePath();c.fill();c.stroke();c.strokeStyle='#fff';c.lineWidth=1.5;c.shadowBlur=0;c.beginPath();c.moveTo(x,y-r*0.3);c.lineTo(x,y+r*0.5);c.stroke();c.beginPath();c.moveTo(x-r*0.4,y+r*0.1);c.lineTo(x+r*0.4,y+r*0.1);c.stroke();c.restore();}
function drawClockIcon(c,x,y,r,col){c.save();c.shadowColor=col;c.shadowBlur=16;c.strokeStyle=col;c.lineWidth=2;c.fillStyle=col+'25';c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fill();c.stroke();const t=Date.now()/1000;c.strokeStyle='#fff';c.lineWidth=2;c.shadowBlur=0;c.lineCap='round';c.beginPath();c.moveTo(x,y);c.lineTo(x+Math.cos(t)*r*0.55,y+Math.sin(t)*r*0.55);c.stroke();c.beginPath();c.moveTo(x,y);c.lineTo(x+Math.cos(t*12)*r*0.35,y+Math.sin(t*12)*r*0.35);c.stroke();c.restore();}

// ================================================================
function spawnRing(x,y,col,spd,lw){rings.push({x,y,rad:10,col,spd:spd||4,a:0.8,lw:lw||2});}
function spawnStarburst(x,y,col){
  for(let i=0;i<22;i++){const a=(i/22)*Math.PI*2,s=4+Math.random()*6;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*3,col,l:50,ml:50});}
  for(let i=0;i<3;i++) setTimeout(()=>spawnRing(x,y,col,4+i*2,2),i*80);
}
function spawnBombWave(){
  for(let i=0;i<6;i++) setTimeout(()=>spawnRing(W/2,H/2,'#ff6b35',8+i*3,3),i*55);
  for(let i=0;i<50;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*10;const col=['#ff6b35','#ffdd00','#ff4757'][~~(Math.random()*3)];parts.push({x:Math.random()*W,y:Math.random()*H,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*4,col,l:40+~~(Math.random()*30),ml:70});}
}
function showFloatText(x,y,txt,col,sz){floatTexts.push({x,y,txt,col,size:sz||14,life:70,maxLife:70,a:1});}
let toastT;
function showToast(msg,col){
  const el=document.getElementById('puToast');
  el.textContent=msg;el.style.color='#000';el.style.background=col;el.style.boxShadow=`0 0 18px ${col}`;el.style.opacity='1';
  clearTimeout(toastT);toastT=setTimeout(()=>el.style.opacity='0',1800);
}

function applyPowerup(p){
  if(p.type==='shield'){shieldOn=true;shT=300;spawnRing(ship.x,ship.y,'#00d4ff',5);boom(ship.x,ship.y,'#00d4ff');screenFlash={r:0,g:180,b:255,a:0.2};playSound('shield');showToast('🛡️ SHIELD!','#00d4ff');showFloatText(ship.x,ship.y-40,'🛡️','#00d4ff',22);spawnStarburst(ship.x,ship.y,'#00d4ff');}
  else if(p.type==='slow'){slowOn=true;slT=260;spawnRing(ship.x,ship.y,'#ffdd00',5);boom(ship.x,ship.y,'#ffdd00');screenFlash={r:255,g:220,b:0,a:0.14};playSound('powerup');showToast('⏱️ SLOW!','#ffdd00');showFloatText(ship.x,ship.y-40,'⏱️','#ffdd00',22);spawnStarburst(ship.x,ship.y,'#ffdd00');}
  else if(p.type==='bomb'){const cnt=asts.length;asts.forEach(a=>boom(a.x,a.y,a.col));asts=[];score+=cnt*15;updateHUD();screenFlash={r:255,g:100,b:0,a:0.4};playSound('bomb');showToast('💣 BLAST!','#ff6b35');showFloatText(W/2,H/2-50,`💣 +${cnt*15}`,'#ff6b35',20);spawnBombWave();}
  else if(p.type==='heart'){lives=Math.min(5,lives+1);spawnRing(ship.x,ship.y,'#ff3366',5);boom(ship.x,ship.y,'#ff3366');screenFlash={r:255,g:50,b:100,a:0.2};playSound('powerup');showToast('❤️ +1 LIFE!','#ff3366');showFloatText(ship.x,ship.y-40,'❤️ +1 LIFE!','#ff3366',17);for(let i=0;i<22;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*5;parts.push({x:ship.x,y:ship.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*2,col:'#ff3366',l:40,ml:40});}for(let i=0;i<3;i++)setTimeout(()=>spawnRing(ship.x,ship.y,'#ff3366',3+i*2,2),i*100);updateHUD();}
}

function spawnAst(){
  const cols=['#ff4757','#ff6b81','#ff9f43','#ee5a24','#a55eea'];
  const col=cols[~~(Math.random()*cols.length)];
  const pts=7+~~(Math.random()*5),sh=Array.from({length:pts},()=>0.65+Math.random()*0.65),r=12+Math.random()*16;
  asts.push({x:r+Math.random()*(W-r*2),y:-r,r,col,vx:(Math.random()-.5)*2.5,vy:spd+Math.random()*spd,rot:0,rs:(Math.random()-.5)*0.06,pts,sh});
}
function spawnPup(){
  const types=['shield','slow','bomb','heart'],weights=[2,2,1,3];
  let tot=weights.reduce((a,b)=>a+b,0),rand=Math.random()*tot,t;
  for(let i=0;i<types.length;i++){rand-=weights[i];if(rand<=0){t=types[i];break;}}
  t=t||'heart';
  const cols={shield:'#00d4ff',slow:'#ffdd00',bomb:'#ff6b35',heart:'#ff3366'};
  pups.push({x:30+Math.random()*(W-60),y:-25,r:14,type:t,col:cols[t],rot:0,pulse:0});
}

function d2(x1,y1,x2,y2){const dx=x1-x2,dy=y1-y2;return dx*dx+dy*dy;}
function boom(x,y,col){for(let i=0;i<16;i++){const a=Math.random()*Math.PI*2,s=1.5+Math.random()*4;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:1.5+Math.random()*3,col,l:28+~~(Math.random()*28),ml:56});}}
function hexRgb(hex){const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);return r?`${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}`:'0,255,200';}
let shaking=false;
function shake(){if(shaking)return;shaking=true;let n=0;const id=setInterval(()=>{canvas.style.transform=`translate(${(Math.random()-.5)*9}px,${(Math.random()-.5)*9}px)`;if(++n>12){clearInterval(id);canvas.style.transform='';shaking=false;}},28);}

function updateHUD(){
  document.getElementById('elSc').textContent=score;
  document.getElementById('elLv').textContent=level;
  document.getElementById('elLi').textContent='❤️'.repeat(lives)||'💀';
  document.getElementById('elCo').textContent='🪙'+coins;
  if(score>best){best=score;save();}
  document.getElementById('elBe').textContent=best;
}

function gameOver(){
  running=false;
  playSound('gameover');
  document.getElementById('abilityBar').style.display='none';
  document.getElementById('ovSc').textContent=score;
  document.getElementById('ovMsg').textContent=score>=best?'🏆 New High Score!':'Final Score';
  if(sessionCoins>0){
    showCoinSlide();
  } else {
    document.getElementById('scOver').style.display='flex';
  }
  save();
}

// ================================================================
// SOUND SYSTEM — Web Audio API (no files needed)
// ================================================================
let audioCtx = null;
let soundEnabled = true;

function getAudio() {
  if(!audioCtx) {
    try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){}
  }
  return audioCtx;
}

// Resume AudioContext on first touch (required by browsers)
document.addEventListener('touchstart', ()=>{ if(audioCtx && audioCtx.state==='suspended') audioCtx.resume(); }, {once:false, passive:true});
document.addEventListener('click',      ()=>{ if(audioCtx && audioCtx.state==='suspended') audioCtx.resume(); }, {once:false});

function playSound(type) {
  if(!soundEnabled) return;
  const ac = getAudio();
  if(!ac) return;

  const t = ac.currentTime;

  switch(type) {

    case 'shoot': {
      // Short laser pew
      const o=ac.createOscillator(), g=ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.setValueAtTime(880,t);
      o.frequency.exponentialRampToValueAtTime(220,t+0.08);
      g.gain.setValueAtTime(0.12,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.09);
      o.start(t); o.stop(t+0.09);
      break;
    }

    case 'explode': {
      // Asteroid explosion — noise burst
      const bufSize = Math.floor(ac.sampleRate * 0.18);
      const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufSize);
      const src = ac.createBufferSource(); src.buffer = buf;
      const g = ac.createGain();
      const filt = ac.createBiquadFilter();
      filt.type='bandpass'; filt.frequency.value=400;
      src.connect(filt); filt.connect(g); g.connect(ac.destination);
      g.gain.setValueAtTime(0.6, t);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.18);
      src.start(t); src.stop(t+0.18);
      break;
    }

    case 'hit': {
      // Ship hit — low thud
      const o=ac.createOscillator(), g=ac.createGain();
      o.type='sawtooth';
      o.connect(g); g.connect(ac.destination);
      o.frequency.setValueAtTime(120,t);
      o.frequency.exponentialRampToValueAtTime(40,t+0.25);
      g.gain.setValueAtTime(0.5,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
      o.start(t); o.stop(t+0.25);
      break;
    }

    case 'powerup': {
      // Power-up collect — rising arpeggio
      [523,659,784,1047].forEach((freq,i)=>{
        const o=ac.createOscillator(), g=ac.createGain();
        o.type='sine';
        o.connect(g); g.connect(ac.destination);
        const st=t+i*0.07;
        o.frequency.setValueAtTime(freq,st);
        g.gain.setValueAtTime(0.18,st);
        g.gain.exponentialRampToValueAtTime(0.001,st+0.12);
        o.start(st); o.stop(st+0.12);
      });
      break;
    }

    case 'ability': {
      // Ability activated — dramatic swoosh
      const o=ac.createOscillator(), g=ac.createGain();
      o.type='sawtooth';
      o.connect(g); g.connect(ac.destination);
      o.frequency.setValueAtTime(200,t);
      o.frequency.exponentialRampToValueAtTime(1200,t+0.3);
      g.gain.setValueAtTime(0.25,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      o.start(t); o.stop(t+0.3);
      break;
    }

    case 'levelup': {
      // Level up — fanfare
      [[523,0],[659,0.1],[784,0.2],[1047,0.3]].forEach(([freq,delay])=>{
        const o=ac.createOscillator(), g=ac.createGain();
        o.type='triangle';
        o.connect(g); g.connect(ac.destination);
        const st=t+delay;
        o.frequency.setValueAtTime(freq,st);
        g.gain.setValueAtTime(0.2,st);
        g.gain.exponentialRampToValueAtTime(0.001,st+0.2);
        o.start(st); o.stop(st+0.22);
      });
      break;
    }

    case 'coin': {
      // Coin earned — bright ding
      const o=ac.createOscillator(), g=ac.createGain();
      o.type='sine';
      o.connect(g); g.connect(ac.destination);
      o.frequency.setValueAtTime(1400,t);
      o.frequency.exponentialRampToValueAtTime(1800,t+0.06);
      g.gain.setValueAtTime(0.15,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
      o.start(t); o.stop(t+0.1);
      break;
    }

    case 'gameover': {
      // Game over — descending sad tones
      [[400,0],[330,0.18],[262,0.36],[196,0.54]].forEach(([freq,delay])=>{
        const o=ac.createOscillator(), g=ac.createGain();
        o.type='sawtooth';
        o.connect(g); g.connect(ac.destination);
        const st=t+delay;
        o.frequency.setValueAtTime(freq,st);
        g.gain.setValueAtTime(0.22,st);
        g.gain.exponentialRampToValueAtTime(0.001,st+0.22);
        o.start(st); o.stop(st+0.22);
      });
      break;
    }

    case 'shield': {
      // Shield up — electric hum
      const o=ac.createOscillator(), g=ac.createGain();
      o.type='square';
      o.connect(g); g.connect(ac.destination);
      o.frequency.setValueAtTime(440,t);
      o.frequency.linearRampToValueAtTime(880,t+0.2);
      g.gain.setValueAtTime(0.15,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
      o.start(t); o.stop(t+0.2);
      break;
    }

    case 'bomb': {
      // Big explosion — layered: noise burst + low boom
      const dur = 0.6;
      const bufSize = Math.floor(ac.sampleRate * dur);
      const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0;i<bufSize;i++){
        const env = Math.pow(1 - i/bufSize, 1.5);
        data[i] = (Math.random()*2-1) * env;
      }
      // noise layer
      const src = ac.createBufferSource(); src.buffer = buf;
      const g = ac.createGain();
      const filt = ac.createBiquadFilter();
      filt.type = 'lowpass'; filt.frequency.value = 400;
      src.connect(filt); filt.connect(g); g.connect(ac.destination);
      g.gain.setValueAtTime(1.2, t);
      g.gain.exponentialRampToValueAtTime(0.001, t+dur);
      src.start(t); src.stop(t+dur);
      // low boom layer
      const o = ac.createOscillator(), og = ac.createGain();
      o.type = 'sine';
      o.connect(og); og.connect(ac.destination);
      o.frequency.setValueAtTime(80, t);
      o.frequency.exponentialRampToValueAtTime(20, t+0.4);
      og.gain.setValueAtTime(1.0, t);
      og.gain.exponentialRampToValueAtTime(0.001, t+0.4);
      o.start(t); o.stop(t+0.4);
      break;
    }
  }
}
